name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-pc-windows-msvc]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build native module (release)
        run: npx napi build --platform --release --cargo-cwd crates/wincap-napi --target ${{ matrix.target }}

      - name: Smoke test
        shell: pwsh
        run: |
          node -e "const w = require('./lib'); console.log('version:', w.version()); console.log('capabilities:', JSON.stringify(w.getCapabilities()));"

      - name: Stage release artifacts
        shell: pwsh
        run: |
          $stage = "release-stage"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          $node = Get-ChildItem -Path . -Filter "*.node" -Depth 0 | Select-Object -First 1
          if (-not $node) { throw ".node binary not found in project root" }
          Copy-Item $node.FullName "$stage/$($node.Name)"
          # Also include the JS facade and type definitions
          Copy-Item lib.js "$stage/lib.js"
          Copy-Item lib.d.ts "$stage/lib.d.ts"
          Copy-Item index.js "$stage/index.js"
          Copy-Item index.d.ts "$stage/index.d.ts"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wincap-${{ matrix.target }}
          path: release-stage/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            artifacts/* \
            --repo ${{ github.repository }} \
            --title "wincap ${{ github.ref_name }}" \
            --generate-notes
