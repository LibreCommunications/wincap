name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2025

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Configure MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - run: npm install --no-audit --no-fund

      - name: Build native module
        run: npx cmake-js compile --arch=x64 --CDWINCAP_ENABLE_WERROR=ON

      - name: Build TypeScript
        run: npm run build:ts

      - name: Stage release artifacts
        shell: pwsh
        run: |
          $stage = "release-stage"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          $addon = Get-ChildItem -Path build -Filter wincap.node -Recurse | Select-Object -First 1
          if (-not $addon) { throw "wincap.node not found under build/" }
          Copy-Item $addon.FullName "$stage/wincap-x64.node"
          if (Test-Path dist) { Compress-Archive -Path dist -DestinationPath "$stage/wincap-dist.zip" -Force }

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          gh release create ${{ github.ref_name }} `
            release-stage/wincap-x64.node `
            release-stage/wincap-dist.zip `
            --repo ${{ github.repository }} `
            --title "wincap ${{ github.ref_name }}" `
            --generate-notes
