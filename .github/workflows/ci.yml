name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: build (${{ matrix.arch }})
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        arch: [x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Configure MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Build native (Node ABI)
        run: npx cmake-js compile --arch=${{ matrix.arch }} --CDWINCAP_ENABLE_WERROR=ON

      - name: Build TypeScript
        run: npm run build:ts

      - name: Smoke test
        shell: pwsh
        run: |
          $addon = Get-ChildItem -Path build -Filter wincap.node -Recurse | Select-Object -First 1
          if (-not $addon) { throw "wincap.node not found under build/" }
          Write-Host "Found addon: $($addon.FullName)"
          node -e "const w = require('$($addon.FullName -replace '\\','/')'); console.log(w.version()); console.log(JSON.stringify(w.getCapabilities()));"

