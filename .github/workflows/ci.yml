name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-pc-windows-msvc]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build native module (release)
        run: npx napi build --platform --release --cargo-cwd crates/wincap-napi --target ${{ matrix.target }}

      - name: Smoke test
        shell: pwsh
        run: |
          node -e "const w = require('./lib'); console.log('version:', w.version()); console.log('AudioSession:', typeof w.AudioSession);"
